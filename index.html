<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chelsea's Tech Tutorials</title>
    <meta name="description" content="How I built and learned it — Claude Code, Obsidian, n8n, self-hosted AI, and more">
    <meta property="og:url" content="https://tselseya.github.io/tutorial-site/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Chelsea's Tech Tutorials">
    <meta property="og:description" content="How I built and learned it — Claude Code, Obsidian, n8n, self-hosted AI, and more">
    <meta property="og:image" content="https://raw.githubusercontent.com/Tselseya/tutorial-site/main/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Chelsea's Tech Tutorials">
    <meta name="twitter:description" content="How I built and learned it — Claude Code, Obsidian, n8n, self-hosted AI, and more">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <!-- FIX 1: marked.js now has version 4.3.0 — previously missing version caused 404 and broke ALL tutorials -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --blue-deep: #0a1f6e;
            --blue-mid: #1a56db;
            --blue-bright: #2f80ed;
            --blue-sky: #56adf5;
            --blue-light: #dbeafe;
            --accent: #00d4ff;
            --white: #ffffff;
            --gray-100: #f0f4ff;
            --gray-200: #e0e8ff;
            --gray-600: #4b5563;
            --gray-800: #1e293b;
            --success: #10b981;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(26, 86, 219, 0.13);
            --shadow-lg: 0 20px 60px rgba(26, 86, 219, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scroll Progress Bar */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue-mid), var(--accent));
            z-index: 1000;
            width: 0%;
            transition: width 0.1s;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
        }

        .sidebar-logo {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--blue-deep);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-logo span {
            color: var(--blue-bright);
        }

        .search-box {
            margin-top: 16px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            background: var(--gray-100);
        }

        .search-input:focus {
            border-color: var(--blue-mid);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .nav-section-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-600);
            padding: 12px 24px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            font-size: 0.95rem;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--blue-light);
            color: var(--blue-mid);
        }

        .nav-item.active {
            background: var(--blue-light);
            color: var(--blue-mid);
            border-left-color: var(--blue-mid);
            font-weight: 600;
        }

        .nav-item .last-updated {
            font-size: 0.75rem;
            color: var(--gray-600);
            margin-left: auto;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            z-index: 150;
            padding: 0 16px;
            align-items: center;
            justify-content: space-between;
        }

        .hamburger {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--blue-deep);
            font-size: 1.4rem;
        }

        .mobile-logo {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--blue-deep);
        }

        .mobile-logo span {
            color: var(--blue-bright);
        }

        /* Tutorial Container */
        .tutorial-container {
            flex: 1;
            padding: 40px 48px;
            max-width: 900px;
            margin: 0 auto;
        }

        .tutorial-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            color: var(--gray-600);
        }

        .tutorial-empty h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1.5rem;
            color: var(--gray-800);
            margin-bottom: 12px;
        }

        /* TOC */
        .toc {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 32px;
            display: none;
        }

        .toc.visible {
            display: block;
        }

        .toc-title {
            font-family: 'Sora', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .toc-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .toc-item {
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .toc-item a {
            color: var(--gray-600);
            text-decoration: none;
            transition: color 0.15s;
        }

        .toc-item a:hover {
            color: var(--blue-mid);
        }

        .toc-item.level-2 {
            padding-left: 16px;
        }

        .toc-item.level-3 {
            padding-left: 32px;
            font-size: 0.85rem;
        }

        /* Tutorial Content */
        .tutorial-content {
            display: none;
        }

        .tutorial-content.visible {
            display: block;
        }

        .tutorial-content h1 {
            font-family: 'Sora', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--blue-deep);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .tutorial-content h1 + p {
            font-size: 1.1rem;
            color: var(--gray-600);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .tutorial-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--gray-200);
        }

        .tutorial-meta .tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            padding: 4px 10px;
            background: var(--blue-light);
            color: var(--blue-mid);
            border-radius: 20px;
        }

        .tutorial-meta .date {
            font-size: 0.85rem;
            color: var(--gray-600);
        }

        .tutorial-content h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--blue-deep);
            margin: 40px 0 16px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }

        .tutorial-content h2:first-of-type {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        .tutorial-content h3 {
            font-family: 'Sora', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            margin: 28px 0 12px;
        }

        .tutorial-content p {
            font-size: 1rem;
            line-height: 1.75;
            color: var(--gray-600);
            margin-bottom: 16px;
        }

        .tutorial-content ul, .tutorial-content ol {
            margin: 0 0 16px 24px;
            color: var(--gray-600);
            line-height: 1.75;
        }

        .tutorial-content li {
            margin-bottom: 8px;
        }

        .tutorial-content strong {
            color: var(--gray-800);
            font-weight: 600;
        }

        .tutorial-content a {
            color: var(--blue-mid);
            text-decoration: none;
        }

        .tutorial-content a:hover {
            text-decoration: underline;
        }

        /* Code Blocks */
        .tutorial-content pre {
            background: #1e1e2e;
            border-radius: var(--radius-sm);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .tutorial-content code {
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .tutorial-content pre code {
            display: block;
            padding: 20px;
            overflow-x: auto;
            color: #cdd6f4;
        }

        .tutorial-content :not(pre) > code {
            background: var(--gray-200);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.875em;
            color: var(--blue-mid);
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .copy-btn.copied {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        /* Tables */
        .tutorial-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.95rem;
        }

        .tutorial-content th {
            background: var(--blue-light);
            color: var(--blue-mid);
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            border-bottom: 2px solid var(--blue-mid);
        }

        .tutorial-content td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-200);
            color: var(--gray-600);
        }

        .tutorial-content tr:hover td {
            background: var(--gray-100);
        }

        /* Blockquotes */
        .tutorial-content blockquote {
            border-left: 4px solid var(--blue-mid);
            background: var(--blue-light);
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .tutorial-content blockquote p {
            margin: 0;
            color: var(--blue-mid);
            font-size: 0.95rem;
        }

        .tutorial-content blockquote strong {
            display: block;
            margin-bottom: 4px;
            color: var(--blue-deep);
        }

        /* Checkboxes */
        .tutorial-content input[type="checkbox"] {
            margin-right: 8px;
            accent-color: var(--blue-mid);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--gray-600);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--blue-mid);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 199;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.visible {
                display: block;
            }

            .main-content {
                margin-left: 0;
                padding-top: 60px;
            }

            .mobile-header {
                display: flex;
            }

            .tutorial-container {
                padding: 24px 20px;
            }

            .tutorial-content h1 {
                font-size: 1.6rem;
            }

            .tutorial-content h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
        <a href="#" class="mobile-logo">Chelsea's <span>Tutorials</span></a>
        <div style="width: 40px;"></div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="#" class="sidebar-logo" onclick="loadTutorial(null)">
                Chelsea's <span>Tutorials</span>
            </a>
            <div class="search-box">
                <span class="search-icon">⌕</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search tutorials..." oninput="filterTutorials()">
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Tutorials</div>
            <div id="tutorialList"></div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="tutorial-container">
            <!-- Empty State -->
            <div class="tutorial-empty" id="emptyState">
                <h2>Welcome to Chelsea's Tech Tutorials</h2>
                <p>Select a tutorial from the sidebar to get started.</p>
            </div>

            <!-- Table of Contents -->
            <nav class="toc" id="toc">
                <div class="toc-title">Contents</div>
                <ul class="toc-list" id="tocList"></ul>
            </nav>

            <!-- Tutorial Content -->
            <article class="tutorial-content" id="tutorialContent"></article>
        </div>
    </main>

    <script>
        // Tutorial data
        // FIX 2: All 4 URLs now point to tutorial-site/content/ — consistent, public, no MyBrain repo dependency
        const tutorials = [
            {
                id: 'building-systems',
                title: 'Building Systems Guide',
                url: 'https://raw.githubusercontent.com/Tselseya/tutorial-site/main/content/building-systems.md',
                date: null
            },
            {
                id: 'self-hosted-ai',
                title: 'Self-Hosted AI Stack Setup',
                url: 'https://raw.githubusercontent.com/Tselseya/tutorial-site/main/content/self-hosted-ai-stack.md',
                date: null
            },
            {
                id: '2nd-brain',
                title: '2nd Brain Setup',
                // FIX 3: Was pointing to MyBrain repo (may be private). Now in tutorial-site/content/
                url: 'https://raw.githubusercontent.com/Tselseya/tutorial-site/main/content/2nd-brain-usage-guide.md',
                date: null
            },
            {
                id: 'mathdesk-build',
                title: 'MathDesk Build Log',
                // FIX 4: Was 404 (file didn't exist in MyBrain/MathDesk/). Now in tutorial-site/content/
                url: 'https://raw.githubusercontent.com/Tselseya/tutorial-site/main/content/mathdesk-build-log.md',
                date: null
            }
        ];

        let currentTutorial = null;
        let tutorialData = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTutorialList();
            initScrollProgress();
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });
        });

        // Render sidebar list
        function renderTutorialList(filter = '') {
            const listEl = document.getElementById('tutorialList');
            const filtered = tutorials.filter(t =>
                t.title.toLowerCase().includes(filter.toLowerCase())
            );

            listEl.innerHTML = filtered.map(t => `
                <div class="nav-item ${currentTutorial === t.id ? 'active' : ''}"
                     onclick="loadTutorial('${t.id}')">
                    ${t.title}
                    ${t.date ? `<span class="last-updated">${formatDate(t.date)}</span>` : ''}
                </div>
            `).join('');
        }

        // Filter tutorials
        function filterTutorials() {
            const search = document.getElementById('searchInput').value;
            renderTutorialList(search);
        }

        // Toggle sidebar (mobile)
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('visible');
        }

        // Load tutorial
        async function loadTutorial(id) {
            if (!id) {
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('toc').classList.remove('visible');
                document.getElementById('tutorialContent').classList.remove('visible');
                currentTutorial = null;
                renderTutorialList();
                return;
            }

            // Close sidebar on mobile
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');

            currentTutorial = id;
            renderTutorialList(document.getElementById('searchInput').value);

            const tutorial = tutorials.find(t => t.id === id);
            if (!tutorial) return;

            // Show loading
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('tutorialContent').classList.remove('visible');
            document.getElementById('tutorialContent').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading tutorial...
                </div>
            `;
            document.getElementById('tutorialContent').classList.add('visible');
            document.getElementById('toc').classList.remove('visible');

            try {
                const response = await fetch(tutorial.url);
                if (!response.ok) throw new Error('Failed to fetch');
                const markdown = await response.text();

                // Parse frontmatter
                const { content, meta } = parseFrontmatter(markdown);
                tutorial.date = meta.date;

                // Render markdown
                const html = marked.parse(content);

                // Process code blocks for copy buttons
                document.getElementById('tutorialContent').innerHTML = html;
                addCopyButtons();

                // Generate TOC
                generateTOC(content);

                // Update tutorial list with dates
                renderTutorialList(document.getElementById('searchInput').value);

            } catch (error) {
                document.getElementById('tutorialContent').innerHTML = `
                    <div class="tutorial-empty">
                        <h2>Error Loading Tutorial</h2>
                        <p>Could not load "${tutorial.title}". Please try again.</p>
                    </div>
                `;
            }
        }

        // Parse frontmatter
        function parseFrontmatter(markdown) {
            const match = markdown.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
            if (!match) return { content: markdown, meta: {} };

            const meta = {};
            const metaLines = match[1].split('\n');
            metaLines.forEach(line => {
                const [key, ...valueParts] = line.split(':');
                if (key && valueParts.length) {
                    meta[key.trim()] = valueParts.join(':').trim();
                }
            });

            return { content: match[2], meta };
        }

        // Generate TOC
        function generateTOC(markdown) {
            const headingRegex = /^(#{1,3})\s+(.+)$/gm;
            const headings = [];
            let match;

            while ((match = headingRegex.exec(markdown)) !== null) {
                const level = match[1].length;
                const text = match[2];
                const slug = text.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                headings.push({ level, text, slug });
            }

            if (headings.length === 0) {
                document.getElementById('toc').classList.remove('visible');
                return;
            }

            const tocList = document.getElementById('tocList');
            tocList.innerHTML = headings.map(h => `
                <li class="toc-item level-${h.level}">
                    <a href="#${h.slug}" onclick="scrollToHeading('${h.slug}')">${h.text}</a>
                </li>
            `).join('');

            document.getElementById('toc').classList.add('visible');

            // Add IDs to headings
            setTimeout(() => {
                headings.forEach(h => {
                    const el = document.querySelector(`.tutorial-content h${h.level}:contains("${h.text}")`);
                    if (el) el.id = h.slug;
                });
            }, 100);
        }

        // Scroll to heading
        function scrollToHeading(slug) {
            const el = document.getElementById(slug);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Add copy buttons to code blocks
        function addCopyButtons() {
            const preBlocks = document.querySelectorAll('.tutorial-content pre');
            preBlocks.forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = () => copyCode(pre, btn);
                pre.style.position = 'relative';
                pre.appendChild(btn);
            });
        }

        // Copy code
        function copyCode(pre, btn) {
            const code = pre.querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Scroll progress
        function initScrollProgress() {
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                document.getElementById('scrollProgress').style.width = scrolled + '%';
            });
        }

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
    </script>
</body>
</html>
